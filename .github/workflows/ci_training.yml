name: ML Training CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci_training.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      n_estimators:
        description: 'Number of estimators'
        required: false
        default: '100'
      max_depth:
        description: 'Max depth'
        required: false
        default: '5'

env:
  PYTHON_VERSION: '3.12.7'
  MLFLOW_VERSION: '2.19.0'

jobs:
  training-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Set up job
        run: echo "Starting ML Training CI Pipeline"

      # Checkout WAJIB di atas biar mesin bisa baca requirements.txt lu!
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==${{ env.MLFLOW_VERSION }}
          pip install pandas numpy scikit-learn matplotlib seaborn dagshub
          pip install conda-pack
          echo "Dependencies installed successfully"

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=sqlite:///mlruns.db" >> $GITHUB_ENV
          echo "MLflow Tracking URI set"

      - name: Download Dataset
        run: |
          cd MLProject
          python -c "
          import pandas as pd, numpy as np
          from sklearn.preprocessing import LabelEncoder, StandardScaler
          url = 'https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv'
          df = pd.read_csv(url)
          df.to_csv('titanic_raw.csv', index=False)
          df = df.drop(columns=['PassengerId','Name','Ticket','Cabin'])
          df['FamilySize'] = df['SibSp'] + df['Parch'] + 1
          df['IsAlone'] = (df['FamilySize'] == 1).astype(int)
          df['Age'] = df['Age'].fillna(df['Age'].median())
          df['Embarked'] = df['Embarked'].fillna(df['Embarked'].mode()[0])
          Q1, Q3 = df['Fare'].quantile([0.25, 0.75])
          IQR = Q3 - Q1
          df['Fare'] = df['Fare'].clip(lower=Q1 - 1.5*IQR, upper=Q3 + 1.5*IQR)
          df['AgeGroup'] = pd.cut(df['Age'], bins=[0,12,18,35,60,100], labels=['Child','Teenager','Young Adult','Adult','Senior'])
          df['FareBin'] = pd.qcut(df['Fare'], q=4, labels=['Low','Medium','High','Very High'], duplicates='drop')
          le = LabelEncoder()
          for col in ['Sex','Embarked','AgeGroup','FareBin']:
              df[col] = le.fit_transform(df[col].astype(str))
          sc = StandardScaler()
          num_cols = ['Age','Fare','SibSp','Parch','FamilySize']
          df[num_cols] = sc.fit_transform(df[num_cols])
          df.to_csv('titanic_preprocessing.csv', index=False)
          print(f'Dataset ready: {df.shape}')
          "

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . \
            -P n_estimators=${{ github.event.inputs.n_estimators || '100' }} \
            -P max_depth=${{ github.event.inputs.max_depth || '5' }} \
            -P dataset_path=titanic_preprocessing.csv \
            --env-manager=local \
            --experiment-name "Titanic Survival Prediction"

      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          if [ -f latest_run_id.txt ]; then
            RUN_ID=$(cat latest_run_id.txt)
            echo "MLFLOW_RUN_ID=$RUN_ID" >> $GITHUB_ENV
            echo "Latest MLflow Run ID: $RUN_ID"
          else
            echo "latest_run_id.txt not found, proceeding without run ID"
          fi

      - name: Upload to GitHub (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-run-artifacts
          path: |
            MLProject/mlruns/
            MLProject/titanic_preprocessing.csv
            MLProject/latest_run_id.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Build Docker Model
        run: |
          cd MLProject
          mlflow models build-docker -m "runs:/${{ env.MLFLOW_RUN_ID }}/model" -n titanic-model:latest --env-manager local

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag titanic-model:latest ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest

      - name: Complete job
        run: |
          echo "========================================"
          echo "ML Training CI Pipeline COMPLETED!"
          echo "========================================"
          echo "Run ID     : ${{ env.MLFLOW_RUN_ID }}"
          echo "========================================"
